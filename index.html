<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Amor</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #d81b60; }
        button { background: #d81b60; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 20px; }
        #status { color: #888; margin-top: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color: #d81b60;">Nota para el 19</h2>
    <p>Este codigo elimina acentos para evitar errores de impresion.</p>
    <button id="printBtn">IMPRIMIR AHORA</button>
    <div id="status">Lista</div>
</div>

<script>
    const printBtn = document.getElementById('printBtn');
    const status = document.getElementById('status');

    printBtn.addEventListener('click', async () => {
        try {
            status.innerText = "Buscando...";
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ["e7810a71-73ae-499d-8c15-faa9aef0c3f2", "000018f0-0000-1000-8000-00805f9b34fb"]
            });

            const server = await device.gatt.connect();
            const services = await server.getPrimaryServices();
            const service = services[0];
            const characteristics = await service.getCharacteristics();
            const writeChar = characteristics.find(c => c.properties.write || c.properties.writeWithoutResponse);

            const encoder = new TextEncoder();
            
            // COMANDOS BASICOS
            const init = new Uint8Array([0x1B, 0x40]);
            const center = new Uint8Array([0x1B, 0x61, 0x01]);
            const left = new Uint8Array([0x1B, 0x61, 0x00]);

            // Texto sin acentos para evitar simbolos raros y con saltos manuales (\n)
            const lineas = [
                "      19 de Abril de 2026\n",
                "--------------------------------\n",
                "Hoy, 19/04/2026, quiero\n",
                "recordarte que Te amo con toda\n",
                "mi alma, y que estoy\n",
                "profundamente enamorado de la\n",
                "mujer que sos.\n\n",
                "Quiero que estemos juntos cada\n",
                "19 que me restan.\n\n",
                "Gracias por cada detalle, mimo\n",
                "y todo lo que viene de vos. No\n",
                "puedo estar mas feliz de tu\n",
                "presencia en mi vida.\n\n",
                "      Con amor, tu Pepe.\n\n",
                "<3 <3 <3 <3 <3 <3 <3 <3 <3 <3\n",
                "<3 <3 <3 <3 <3 <3 <3 <3 <3 <3\n",
                "\n\n\n\n"
            ];

            await writeChar.writeValue(init);
            await writeChar.writeValue(center);

            for (const linea of lineas) {
                // Enviamos linea por linea con un mini retraso para no saturar el Bluetooth
                await writeChar.writeValue(encoder.encode(linea));
                await new Promise(r => setTimeout(r, 50)); 
            }

            status.innerText = "Impreso!";
            setTimeout(() => device.gatt.disconnect(), 2000);

        } catch (error) {
            status.innerText = "Error: " + error.message;
        }
    });
</script>
</body>
</html>
