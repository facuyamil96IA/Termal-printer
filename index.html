<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recibo Oficial 23093108</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 20px; border: 2px solid #00e5ff; }
        h2 { color: #00e5ff; margin-bottom: 5px; }
        .num { font-family: monospace; color: #888; margin-bottom: 20px; }
        button { background: #00e5ff; color: #000; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        #status { margin-top: 15px; color: #666; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>COMPROBANTE DE VENTA</h2>
    <div class="num">Nro: 23093108</div>
    
    <div style="text-align: left; background: #fff; color: #000; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; margin-bottom: 20px; line-height: 1.4;">
        RECIBE: Selene Alfonzo<br>
        ENTREGA: Facundo Adan<br>
        ------------------------<br>
        PRODUCTO: Corazon Puro<br>
        PRECIO: Vida Juntos<br>
        FECHA: 19/11/2025
    </div>

    <button id="printBtn">IMPRIMIR FACTURA</button>
    <div id="status">Lista para emitir ticket</div>
</div>

<script>
    const printBtn = document.getElementById('printBtn');
    const status = document.getElementById('status');

    printBtn.addEventListener('click', async () => {
        try {
            status.innerText = "Buscando...";
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ["e7810a71-73ae-499d-8c15-faa9aef0c3f2", "000018f0-0000-1000-8000-00805f9b34fb"]
            });

            const server = await device.gatt.connect();
            const service = (await server.getPrimaryServices())[0];
            const characteristics = await service.getCharacteristics();
            const writeChar = characteristics.find(c => c.properties.write || c.properties.writeWithoutResponse);

            const encoder = new TextEncoder();
            const init = new Uint8Array([0x1B, 0x40]);
            const center = new Uint8Array([0x1B, 0x61, 0x01]);
            const left = new Uint8Array([0x1B, 0x61, 0x00]);
            const boldOn = new Uint8Array([0x1B, 0x45, 0x01]);
            const boldOff = new Uint8Array([0x1B, 0x45, 0x00]);

            const ticket = [
                init, center, boldOn, "RECIBO DE PROPIEDAD\n", boldOff,
                "No. 23093108\n",
                "--------------------------------\n",
                left, boldOn, "COMPRADORA:\n", boldOff, "Selene Alfonzo\n\n",
                boldOn, "PRODUCTO ADQUIRIDO:\n", boldOff, "El corazon de\nFacundo Adan\n\n",
                boldOn, "VALOR PAGADO:\n", boldOff, "Toda una vida juntos\n\n",
                "--------------------------------\n",
                boldOn, "FECHA:     ", boldOff, "19/11/2025\n",
                boldOn, "VALIDEZ:   ", boldOff, "Eterna\n",
                boldOn, "ESTADO:    ", boldOff, "Entregado con amor\n",
                "--------------------------------\n",
                center, "\nGracias por elegirme.\n",
                "<3 <3 <3 <3 <3 <3 <3 <3 <3 <3\n",
                "\n\n\n\n"
            ];

            status.innerText = "Emitiendo...";

            for (const item of ticket) {
                const data = (typeof item === 'string') ? encoder.encode(item) : item;
                await writeChar.writeValue(data);
                await new Promise(r => setTimeout(r, 60)); 
            }

            status.innerText = "¡Ticket emitido!";
            setTimeout(() => device.gatt.disconnect(), 2000);

        } catch (error) {
            status.innerText = "Error: " + error.message;
        }
    });
</script>
</body>
</html>
