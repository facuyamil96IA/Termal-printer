<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-210 Print Pro</title>
    <style>
        :root {
            --primary: #00e5ff;
            --bg: #0f0f0f;
            --card: #1e1e1e;
        }
        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: var(--primary); margin-bottom: 1.5rem; font-weight: 300; }
        textarea {
            width: 100%;
            background: #121212;
            color: #00ff00;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            box-sizing: border-box;
            font-family: monospace;
            margin-bottom: 1rem;
            resize: none;
        }
        button {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        button:active { transform: scale(0.98); }
        #status {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #888;
        }
        .dot {
            height: 10px;
            width: 10px;
            background-color: #444;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .online { background-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>

<div class="container">
    <h2><span id="indicator" class="dot"></span> PT-210 Ready</h2>
    <textarea id="textToPrint" rows="6">
FACUNDO DEV
--------------------------------
PRODUCTO: PRUEBA BT
TOTAL: $0.00
--------------------------------
¡GRACIAS POR SU COMPRA!
    </textarea>
    
    <button id="printBtn">CONECTAR E IMPRIMIR</button>
    
    <div id="status">Esperando conexión...</div>
</div>

<script>
    const printBtn = document.getElementById('printBtn');
    const status = document.getElementById('status');
    const indicator = document.getElementById('indicator');

    // Lista de servicios comunes en impresoras térmicas
    const COMMON_SERVICES = [
        "000018f0-0000-1000-8000-00805f9b34fb",
        "e7810a71-73ae-499d-8c15-faa9aef0c3f2",
        "49535343-fe7d-4ae5-8fa9-9fafd205e455"
    ];

    printBtn.addEventListener('click', async () => {
        try {
            status.innerText = "Buscando... (Activa el GPS)";
            
            // Filtro agresivo: Aceptamos todo pero buscamos los servicios típicos
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: COMMON_SERVICES
            });

            status.innerText = "Vinculando con: " + device.name;
            const server = await device.gatt.connect();
            
            // Intentamos encontrar el servicio disponible
            let service;
            for (const uuid of COMMON_SERVICES) {
                try {
                    service = await server.getPrimaryService(uuid);
                    if (service) break;
                } catch (e) { continue; }
            }

            if (!service) throw new Error("No se encontró el servicio de impresión.");

            // Buscamos la característica de escritura
            const characteristics = await service.getCharacteristics();
            const writeChar = characteristics.find(c => c.properties.write || c.properties.writeWithoutResponse);

            if (!writeChar) throw new Error("No se puede escribir en esta impresora.");

            indicator.classList.add('online');
            status.innerText = "Imprimiendo...";

            // Preparar texto
            const encoder = new TextEncoder();
            const text = "\x1B\x40" + document.getElementById('textToPrint').value + "\n\n\n\n"; 
            const data = encoder.encode(text);

            // Enviar en trozos de 20 bytes (para evitar saturar el buffer)
            const chunkSize = 20;
            for (let i = 0; i < data.length; i += chunkSize) {
                const chunk = data.slice(i, i + chunkSize);
                await writeChar.writeValue(chunk);
            }

            status.innerText = "¡Hecho!";
            setTimeout(() => {
                device.gatt.disconnect();
                indicator.classList.remove('online');
                status.innerText = "Desconectado.";
            }, 3000);

        } catch (error) {
            console.error(error);
            status.innerText = "Error: " + error.message;
            indicator.classList.remove('online');
        }
    });
</script>

</body>
</html>
